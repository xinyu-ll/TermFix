name: Tests

on:
  pull_request:
  push:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: python -m pip install pytest

      - name: Compile Python files
        run: PYTHONPYCACHEPREFIX=/tmp/termfix-pycache python -m py_compile termfix.py termfixlib/*.py

      - name: Run tests
        run: python -m pytest
